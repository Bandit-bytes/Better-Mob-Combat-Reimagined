modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''
displayTest = "MATCH_VERSION"

[[mixins]]
config = "better_mob_combat_reimagined.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "bettercombat"
type = "required"
versionRange = "[2.3.2,2.4)"
ordering = "AFTER"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "playeranimator"
type = "required"
versionRange = "[2.0.4,3)"
ordering = "AFTER"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "cloth_config"
type = "required"
versionRange = "[15.0.130,16)"
ordering = "AFTER"
side = "BOTH"

